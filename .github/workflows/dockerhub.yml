name: Push Container Image

on:
  push:
    tags:
        - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Version
        run: |
            version="$(git describe --tags)" 
            echo "version=$version" >> $GITHUB_ENV
            echo "image_version=${version:1}" >> $GITHUB_ENV


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/dm807cam/inkstone:latest
            ghcr.io/dm807cam/inkstone:${{ env.image_version }}
          # Cairo PDF rendering uses CGO; multi-arch under QEMU is slow and
          # fragile, so we publish linux/amd64 only. See Makefile for pure-Go
          # cross-compiled binaries on other architectures.
          platforms: linux/amd64
          build-args: |
            VERSION=${{ env.version }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
