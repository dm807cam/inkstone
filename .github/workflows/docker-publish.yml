name: Publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/inkstone
          # `latest` and version tags are applied on git tags (v*.*.*); pushes
          # to master publish a rolling `edge` tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=master
          flavor: |
            latest=auto

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cairo PDF rendering uses CGO; multi-arch under QEMU is slow and
          # fragile, so we publish linux/amd64 only. This covers every Synology
          # model that runs Container Manager / Docker (all of which are x86_64).
          # Pure-Go binaries for other architectures come from the Release workflow.
          platforms: linux/amd64
          build-args: |
            VERSION=${{ env.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "${{ steps.build.outputs.digest }}"
